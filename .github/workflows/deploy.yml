name: Deploy Stock (web) to GitHub Pages

# Builds the Expo web export on Linux — sidesteps the local macOS Tahoe ×
# Expo SDK 54 dev-server/export hang — and publishes dist/ to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress deploys finish; only ever publish the latest commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Export web bundle
        # EXPO_PUBLIC_* are inlined into the bundle at build time (Babel
        # replaces process.env.EXPO_PUBLIC_*). --clear because Metro doesn't
        # cache-bust on env changes — defense in depth even on a fresh CI run.
        env:
          EXPO_PUBLIC_CLAUDE_PROXY_URL: ${{ secrets.EXPO_PUBLIC_CLAUDE_PROXY_URL }}
          EXPO_PUBLIC_CLAUDE_PROXY_SECRET: ${{ secrets.EXPO_PUBLIC_CLAUDE_PROXY_SECRET }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web --clear

      - name: SPA + Pages fixups
        run: |
          # Jekyll would strip Expo's _expo/ directory without this.
          touch dist/.nojekyll
          # Expo single-output HTML has no head hook — inject the iOS
          # apple-touch-icon link so "Add to Home Screen" uses the pot icon.
          node scripts/inject-pwa-head.mjs
          # web.output: "single" is a SPA — serve index.html for deep links.
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
